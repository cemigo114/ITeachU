databases:
  - name: iteachu-db
    plan: free
    databaseName: iteachu
    user: iteachu

services:
  - type: web
    name: iteachu-backend
    runtime: node
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: iteachu-db
          property: connectionString
      - key: VITE_ANTHROPIC_API_KEY
        sync: false
