services:
  - type: web
    name: iteachu-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: iteachu-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_ANTHROPIC_API_KEY
        sync: false  # This will need to be set manually in Render dashboard
