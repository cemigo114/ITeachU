# Netlify Configuration for Cognality Learning Website + ITeachU App

[build]
  # Command to build the app and copy to website/app
  command = "npm run build && mkdir -p website/app && cp -r dist/* website/app/"

  # Publish from website directory (contains main site + /app subdirectory)
  publish = "website"

# Build environment variables
# Note: VITE_API_URL must also be set in Netlify UI: Site settings → Environment variables
[build.environment]
  # This is a placeholder - actual value comes from Netlify environment variables
  # But defining it here ensures Netlify knows to look for it

# Redirect app routes to app/index.html for React Router (SPA)
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# Optional: Set custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
