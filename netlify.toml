# Netlify Configuration for ITeachU Frontend

[build]
  # Command to build the frontend
  command = "npm run build"

  # Directory where Vite outputs the built files
  publish = "dist"

# Build environment variables
# Note: VITE_API_URL must also be set in Netlify UI: Site settings → Environment variables
[build.environment]
  # This is a placeholder - actual value comes from Netlify environment variables
  # But defining it here ensures Netlify knows to look for it

# Redirect all routes to index.html for React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Set custom headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
